publish:
  provider: github
  releaseType: draft
appId: com.stevensyu.desktop-notify
productName: desktop-notify
directories:
  output: release
  buildResources: assets
# 打包進 asar 的檔案：electron-vite 的產物（main/preload/renderer）。
files:
  - out/**
asar: true
# 內建造型放到 asar 外的 Contents/Resources/resources/，pet:// 用 file:// 才讀得到。
# 對應 src/main/window.ts builtinRoot()=process.resourcesPath。
extraResources:
  - from: resources
    to: resources
    filter:
      - "**/*"
mac:
  target: dmg
  category: public.app-category.developer-tools
  icon: assets/icon.png # 企鵝 idle 第一格合成（electron-builder 自此產 .icns）
  # 個人使用：無 Apple Developer ID / 公證。'-' = ad-hoc 簽整個 bundle——
  # null（完全不簽）會讓 Gatekeeper 報「damaged」且無放行選項；
  # ad-hoc 簽後變成「無法驗證開發者」，可右鍵開啟或於隱私設定放行。
  identity: '-'
win:
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  icon: assets/icon.png
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
