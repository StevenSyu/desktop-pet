name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      test_version:
        description: '手動驗證用版本號（留空則用 package.json version）'
        required: false
        default: ''

permissions:
  contents: write # 建 draft release + 上傳 artifacts

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (node + web tsconfigs)
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Override version for dispatch validation
        if: ${{ inputs.test_version != '' }}
        run: npm version --no-git-tag-version "${{ inputs.test_version }}"
        shell: bash

      - name: Build and publish draft release
        run: npm run dist -- --publish always
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
