name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: # 驗證 pipeline 用：無 tag 時 electron-builder 以 package.json version 命名 draft

permissions:
  contents: write # 建 draft release + 上傳 artifacts

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (node + web tsconfigs)
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build and publish draft release
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
