name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      test_version:
        # 必填且須用「尚未發布」的版本（如 0.0.0-ci-test）：與既有已發布 release 撞名時
        # electron-publish 會「skipped publishing」靜默跳過、job 仍綠（假陽性）
        description: '驗證用版本號（必填，用尚未發布的版本如 0.0.0-ci-test）'
        required: true

permissions:
  contents: write # 建 draft release + 上傳 artifacts

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (node + web tsconfigs)
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Override version for dispatch validation
        if: ${{ inputs.test_version != '' }}
        # input 走 env 間接引用（template 直插 run 會有 script injection）+ 嚴格 semver 驗證
        env:
          TEST_VERSION: ${{ inputs.test_version }}
        run: |
          if [[ ! "$TEST_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "invalid test_version: $TEST_VERSION"; exit 1
          fi
          npm version --no-git-tag-version "$TEST_VERSION"
        shell: bash

      - name: Build and publish draft release
        run: npm run dist -- --publish always
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
