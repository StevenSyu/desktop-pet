<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: pet:; style-src 'self' 'unsafe-inline'" />
    <title>desktop-notify</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="pet-shell">
      <div id="pet"></div>
      <div id="channel-label" hidden></div>
      <div id="badge" hidden></div>
      <div id="resize-handle" hidden></div>
      <div id="pomodoro-bar" hidden>
        <span id="pomo-time">--:--</span>
        <button id="pomo-toggle" title="開始">▶</button>
        <button id="pomo-stop" title="停止">■</button>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
