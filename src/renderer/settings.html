<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>進階設定</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <div class="panel">
      <header>
        <div class="title">進階設定 · 走動參數</div>
        <button id="close" class="x" aria-label="關閉">×</button>
      </header>

      <section class="group">
        <div class="g-title">走動間隔</div>
        <div class="row">
          <label>最短</label><input id="iMin" type="number" min="0" step="1" /><span class="unit">秒</span>
        </div>
        <div class="row">
          <label>最長</label><input id="iMax" type="number" min="0" step="1" /><span class="unit">秒</span>
        </div>
      </section>

      <section class="group">
        <div class="g-title">走動距離</div>
        <div class="row">
          <label>最短</label><input id="dMin" type="number" min="0" step="1" /><span class="unit">px</span>
        </div>
        <div class="row">
          <label>最長</label><input id="dMax" type="number" min="0" step="1" /><span class="unit">px</span>
        </div>
      </section>

      <section class="group">
        <div class="g-title">走動秒數</div>
        <div class="row">
          <label>最短</label><input id="tMin" type="number" min="0" step="0.1" /><span class="unit">秒</span>
        </div>
        <div class="row">
          <label>最長</label><input id="tMax" type="number" min="0" step="0.1" /><span class="unit">秒</span>
        </div>
      </section>

      <footer>
        <button id="reset" class="ghost">恢復預設</button>
        <button id="save" class="primary">儲存</button>
      </footer>
      <div id="hint" class="hint"></div>
    </div>
    <script type="module" src="./settings.ts"></script>
  </body>
</html>
