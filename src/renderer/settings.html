<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>進階設定</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <div class="panel">
      <header>
        <div class="title">進階設定</div>
        <button id="close" class="x" aria-label="關閉">×</button>
      </header>

      <main class="scroll">
      <section class="group">
        <div class="g-title">走動間隔</div>
        <div class="g-desc">每隔多久 may 會自動走一次。</div>
        <div class="row">
          <label>最短</label><input id="iMin" type="number" min="0" step="1" /><span class="unit">秒</span>
        </div>
        <div class="row">
          <label>最長</label><input id="iMax" type="number" min="0" step="1" /><span class="unit">秒</span>
        </div>
      </section>

      <section class="group">
        <div class="g-title">走動秒數</div>
        <div class="g-desc">每次走動的時長範圍；走動距離會依秒數自動換算。</div>
        <div class="row">
          <label>最短</label><input id="tMin" type="number" min="0" step="0.1" /><span class="unit">秒</span>
        </div>
        <div class="row">
          <label>最長</label><input id="tMax" type="number" min="0" step="0.1" /><span class="unit">秒</span>
        </div>
      </section>

      <section class="group">
        <div class="g-title">蕃茄鐘</div>
        <div class="g-desc">啟用後，hover 寵物會顯示倒數與控制按鈕。</div>
        <div class="row">
          <label>啟用蕃茄鐘</label><input id="pomoEnabled" type="checkbox" />
        </div>
        <div class="row">
          <label>「全部」寵物顯示控制列</label><input id="pomoShowOnAll" type="checkbox" />
        </div>
        <div class="row">
          <label>工作時間</label><input id="pomoWork" type="number" min="1" max="180" step="1" /><span class="unit">分</span>
        </div>
        <div class="row">
          <label>休息時間</label><input id="pomoBreak" type="number" min="1" max="180" step="1" /><span class="unit">分</span>
        </div>
        <div class="row">
          <label>休息結束後</label>
          <select id="pomoAfterBreak">
            <option value="loop">自動開始下一輪</option>
            <option value="pause">暫停等待</option>
          </select>
        </div>
      </section>
      </main>

      <footer>
        <button id="reset" class="ghost">恢復預設</button>
        <button id="save" class="primary">儲存</button>
      </footer>
      <div id="hint" class="hint"></div>
    </div>
    <script type="module" src="./settings.ts"></script>
  </body>
</html>
